_format_version: "3.0"

plugins:
  - name: cors
    config:
      origins:
        - "${{FRONTEND_URL}}"
      headers:
        - "Authorization"
        - "Content-Type"
        - "X-Demo-Session"
      methods:
        - GET
        - POST
        - OPTIONS

  - name: jwt
    routes:
      - games-routes
      - games-ws-routes
    config:
      claims_to_verify:
        - exp
      key_claim_name: kid
      header_names:
        - authorization

  - name: jwt
    route: wallets-routes
    config:
      claims_to_verify:
        - exp
      key_claim_name: kid
      header_names:
        - authorization

  - name: post-function
    routes:
      - games-routes
      - games-ws-routes
    config:
      access:
        - |
          kong.service.request.clear_header("X-User-Id")
          kong.service.request.clear_header("X-Gateway-Authenticated")

          local jwt_payload = kong.ctx.shared.authenticated_jwt_payload
          if jwt_payload and jwt_payload.sub then
            kong.service.request.set_header("X-User-Id", jwt_payload.sub)
            kong.service.request.set_header("X-Gateway-Authenticated", "true")
          end

          local demo_session = kong.request.get_header("X-Demo-Session")
          if demo_session then
            kong.service.request.set_header("X-Demo-Session", demo_session)
          end

  - name: post-function
    route: wallets-routes
    config:
      access:
        - |
          kong.service.request.clear_header("X-User-Id")
          kong.service.request.clear_header("X-Gateway-Authenticated")

          local jwt_payload = kong.ctx.shared.authenticated_jwt_payload
          if jwt_payload and jwt_payload.sub then
            kong.service.request.set_header("X-User-Id", jwt_payload.sub)
            kong.service.request.set_header("X-Gateway-Authenticated", "true")
          end

          local demo_session = kong.request.get_header("X-Demo-Session")
          if demo_session then
            kong.service.request.set_header("X-Demo-Session", demo_session)
          end

