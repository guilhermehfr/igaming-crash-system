services:
  - name: keycloak-service
    url: http://keycloak:8080
    routes:
      - name: keycloak-routes
        paths:
          - /auth
        strip_path: true

  - name: games-service
    url: http://games:4001
    routes:
      - name: games-routes
        paths:
          - /games
        strip_path: false
      - name: games-ws-routes
        paths:
          - /socket.io
        strip_path: false

  - name: wallets-service
    url: http://wallets:4002
    routes:
      - name: wallets-routes
        paths:
          - /wallets
        strip_path: false
