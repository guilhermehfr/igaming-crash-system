_format_version: "3.0"

plugins:
  - name: jwt
    config:
      claims_to_verify:
        - exp
      key_claim_name: kid
      header_names:
        - authorization
      jwks_uri: http://keycloak:8080/realms/crash-game/protocol/openid-connect/certs

  - name: post-function
    config:
      access:
        - |
          local auth = kong.request.get_header("authorization")
          if not auth then
            return
          end
          local m = ngx.re.match(auth, [[\s*[Bb]earer\s+(.+)]], "jo")
          if not m or not m[1] then
            return
          end
          local token = m[1]
          local payload = token:match("^[^.]+%.([^.]+)%.")
          if not payload then
            return
          end
          payload = payload:gsub("-", "+"):gsub("_", "/")
          local pad = 4 - (#payload % 4)
          if pad < 4 then
            payload = payload .. string.rep("=", pad)
          end
          local decoded = ngx.decode_base64(payload)
          if not decoded then
            return
          end
          local sub = decoded:match("\"sub\"%s*:%s*\"([^\"]+)\"")
          if sub then
            kong.service.request.set_header("X-User-Id", sub)
          end

services:
  - name: games-service
    url: http://games:4001
    routes:
      - name: games-routes
        paths:
          - /games
        strip_path: false

  - name: wallets-service
    url: http://wallets:4002
    routes:
      - name: wallets-routes
        paths:
          - /wallets
        strip_path: false